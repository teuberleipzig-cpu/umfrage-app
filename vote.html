<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abstimmen – Umfrage-App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div id="app">
    <div class="loading">Überprüfe deinen Abstimmungslink...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, addDoc, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ERSETZE HIER DEINE FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCV4oMSTOjg0QgfspLChFkNpUC--LRgUiQ",
    authDomain: "bastipriv-6c734.firebaseapp.com",
    projectId: "bastipriv-6c734",
    storageBucket: "bastipriv-6c734.firebasestorage.app",
    messagingSenderId: "202665372147",
    appId: "1:202665372147:web:8b780a20b716dd375d4a86"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appEl = document.getElementById('app');
  const params = new URLSearchParams(window.location.search);
  const tokenId = params.get('token');
  const surveyId = params.get('survey');

  const selections = {};
  let tokenDocId = null;
  let surveyData = null;

  async function init() {
    if (!tokenId || !surveyId) {
      appEl.innerHTML = '<div class="status error">Ungültiger Link. Bitte wende dich an den Admin.</div>';
      return;
    }

    try {
      // 1. Token suchen – nur nach tokenId-Feld (kein Index nötig)
      const tokenQuery = query(
        collection(db, 'tokens'),
        where('tokenId', '==', tokenId)
      );
      const tokenSnap = await getDocs(tokenQuery);

      if (tokenSnap.empty) {
        appEl.innerHTML = '<div class="status error">❌ Ungültiger Token. Dieser Link ist nicht gültig.</div>';
        return;
      }

      // Richtiges Token-Dokument finden (mit passender surveyId)
      let tokenDoc = null;
      tokenSnap.forEach(d => {
        if (d.data().surveyId === surveyId) tokenDoc = d;
      });

      if (!tokenDoc) {
        appEl.innerHTML = '<div class="status error">❌ Dieser Link gehört zu einer anderen Umfrage.</div>';
        return;
      }

      tokenDocId = tokenDoc.id;
      const tokenData = tokenDoc.data();

      // 2. Bereits abgestimmt?
      if (tokenData.used) {
        window.location.href = `results.html?survey=${surveyId}&already=1`;
        return;
      }

      // 3. Sicherheitsnetz: Prüfen ob bereits ein Vote mit diesem Token existiert
      const existingVoteQuery = query(
        collection(db, 'votes'),
        where('tokenId', '==', tokenId)
      );
      const existingVoteSnap = await getDocs(existingVoteQuery);
      if (!existingVoteSnap.empty) {
        // Vote existiert, Token aber noch nicht als used markiert – nachholen
        await updateDoc(doc(db, 'tokens', tokenDocId), { used: true });
        window.location.href = `results.html?survey=${surveyId}&already=1`;
        return;
      }

      // 4. Umfrage direkt über ID laden
      const surveySnap = await getDoc(doc(db, 'surveys', surveyId));
      if (!surveySnap.exists()) {
        appEl.innerHTML = '<div class="status error">Umfrage nicht gefunden.</div>';
        return;
      }
      surveyData = { id: surveySnap.id, ...surveySnap.data() };

      renderVoteForm();
    } catch (err) {
      appEl.innerHTML = `<div class="status error">Fehler: ${err.message}</div>`;
    }
  }

  function renderVoteForm() {
    let html = `
      <h1>${escapeHtml(surveyData.title)}</h1>
      <p class="subtitle">Bewerte jede Option. Veto eliminiert eine Option vollständig.</p>
      <div id="vote-options">`;

    surveyData.options.forEach(option => {
      html += `
        <div class="vote-option">
          <h3>${escapeHtml(option)}</h3>
          <div class="vote-buttons">
            <button class="vote-btn veto"    data-option="${escapeHtml(option)}" data-value="veto" onclick="selectVote(this)">Veto</button>
            <button class="vote-btn score-1" data-option="${escapeHtml(option)}" data-value="1"    onclick="selectVote(this)">1</button>
            <button class="vote-btn score-2" data-option="${escapeHtml(option)}" data-value="2"    onclick="selectVote(this)">2</button>
            <button class="vote-btn score-3" data-option="${escapeHtml(option)}" data-value="3"    onclick="selectVote(this)">3</button>
            <button class="vote-btn score-4" data-option="${escapeHtml(option)}" data-value="4"    onclick="selectVote(this)">4</button>
          </div>
        </div>`;
    });

    html += `
      </div>
      <div id="vote-status"></div>
      <button class="btn btn-primary" onclick="submitVote()" style="margin-top: 8px; width: 100%; padding: 14px;">
        Abstimmung abschicken
      </button>`;

    appEl.innerHTML = html;
  }

  window.selectVote = function(btn) {
    const option = btn.dataset.option;
    const value = btn.dataset.value;
    document.querySelectorAll(`[data-option="${option}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selections[option] = value === 'veto' ? 'veto' : parseInt(value, 10);
  };

  window.submitVote = async function() {
    const statusEl = document.getElementById('vote-status');

    const missingOptions = surveyData.options.filter(o => selections[o] === undefined);
    if (missingOptions.length > 0) {
      statusEl.innerHTML = `<div class="status error">Bitte alle Optionen bewerten! Fehlend: ${missingOptions.map(escapeHtml).join(', ')}</div>`;
      return;
    }

    // Button deaktivieren damit nicht doppelt abgeschickt wird
    const submitBtn = document.querySelector('.btn-primary');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Wird gespeichert...';
    statusEl.innerHTML = '<div class="status info">Wird gespeichert...</div>';

    try {
      // Nochmals prüfen ob Token noch nicht used ist (Race-Condition-Schutz)
      const tokenSnap = await getDoc(doc(db, 'tokens', tokenDocId));
      if (tokenSnap.data().used) {
        window.location.href = `results.html?survey=${surveyId}&already=1`;
        return;
      }

      // Vote speichern
      await addDoc(collection(db, 'votes'), {
        surveyId,
        tokenId,
        votes: selections,
        createdAt: serverTimestamp()
      });

      // Token als used markieren
      await updateDoc(doc(db, 'tokens', tokenDocId), { used: true });

      statusEl.innerHTML = '<div class="status success">✓ Deine Stimme wurde gespeichert!</div>';
      setTimeout(() => {
        window.location.href = `results.html?survey=${surveyId}`;
      }, 1500);
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Abstimmung abschicken';
      statusEl.innerHTML = `<div class="status error">Fehler beim Speichern: ${err.message}</div>`;
    }
  };

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
